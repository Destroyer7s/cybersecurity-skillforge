<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .titlebar { fill: #1c2128; }
      .hdr { fill: #58a6ff; font-weight: bold; }
      .val-ok { fill: #3fb950; }
      .val-warn { fill: #d29922; }
      .val-err { fill: #f85149; }
      .val-dim { fill: #8b949e; }
      .label { fill: #c9d1d9; }
      .py-keyword { fill: #f97583; }
      .py-string { fill: #9ecbff; }
      .py-func { fill: #b392f0; }
      .py-comment { fill: #6a737d; }
      .py-number { fill: #79b8ff; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="860" height="560" rx="10" class="term-bg" />
  <rect width="860" height="38" rx="10" class="titlebar" />
  <rect y="28" width="860" height="10" class="titlebar" />

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#ff5f57" />
  <circle cx="42" cy="19" r="6" fill="#febc2e" />
  <circle cx="62" cy="19" r="6" fill="#28c840" />

  <!-- Title -->
  <text x="430" y="24" text-anchor="middle" fill="#8b949e" font-size="12">python3 vuln_scanner.py — Security Automation Script</text>

  <!-- Script source (collapsed view) -->
  <text x="20" y="60" class="py-comment" font-size="11"># vuln_scanner.py — Automated CVE enrichment + remediation ticket creator</text>
  <text x="20" y="76" class="py-keyword" font-size="11">import</text>
  <text x="62" y="76" class="label" font-size="11">requests, json, csv</text>
  <text x="20" y="92" class="py-keyword" font-size="11">from</text>
  <text x="50" y="92" class="label" font-size="11">datetime</text>
  <text x="110" y="92" class="py-keyword" font-size="11">import</text>
  <text x="152" y="92" class="label" font-size="11">datetime</text>

  <text x="20" y="112" class="py-func" font-size="11">def</text>
  <text x="42" y="112" class="val-ok" font-size="11">enrich_cve</text>
  <text x="118" y="112" class="label" font-size="11">(cve_id):</text>
  <text x="20" y="128" class="py-comment" font-size="11">    # Fetch CVE details from NVD API 2.0</text>
  <text x="20" y="144" class="label" font-size="11">    resp = requests.get(</text>
  <text x="20" y="160" class="py-string" font-size="11">        f"https://services.nvd.nist.gov/rest/json/cves/2.0?cveId={cve_id}"</text>
  <text x="20" y="176" class="label" font-size="11">    ).json()</text>
  <text x="20" y="192" class="py-keyword" font-size="11">    return</text>
  <text x="70" y="192" class="label" font-size="11">resp[</text>
  <text x="98" y="192" class="py-string" font-size="11">"vulnerabilities"</text>
  <text x="220" y="192" class="label" font-size="11">][</text>
  <text x="232" y="192" class="py-number" font-size="11">0</text>
  <text x="242" y="192" class="label" font-size="11">][</text>
  <text x="254" y="192" class="py-string" font-size="11">"cve"</text>
  <text x="285" y="192" class="label" font-size="11">] </text>
  <text x="292" y="192" class="py-keyword" font-size="11">if</text>
  <text x="308" y="192" class="label" font-size="11">resp.get(</text>
  <text x="372" y="192" class="py-string" font-size="11">"vulnerabilities"</text>
  <text x="490" y="192" class="label" font-size="11">)</text>
  <text x="497" y="192" class="py-keyword" font-size="11">else</text>
  <text x="522" y="192" class="py-number" font-size="11">None</text>

  <text x="20" y="212" class="val-ok" font-size="11">analyst@security:~/tools$</text>
  <text x="210" y="212" class="label" font-size="11"> python3 vuln_scanner.py --input scans/nessus_export.csv --sla critical:48,high:7</text>

  <!-- Separator -->
  <line x1="20" y1="224" x2="840" y2="224" stroke="#30363d" stroke-width="1"/>

  <!-- Script output -->
  <text x="20" y="242" class="val-ok" font-size="11">[2026-04-08 09:14:02] Loading scan results from scans/nessus_export.csv...</text>
  <text x="20" y="258" class="val-ok" font-size="11">[2026-04-08 09:14:02] Found 847 vulnerabilities across 124 hosts</text>
  <text x="20" y="274" class="label" font-size="11">[2026-04-08 09:14:03] Enriching critical/high CVEs from NVD API...</text>

  <text x="20" y="294" class="val-err" font-size="11">CRITICAL (CVSS 9.8): CVE-2021-44228 (Log4Shell) — 14 hosts affected</text>
  <text x="20" y="310" class="label" font-size="11">  ↳ Affected: log4j-core &lt;2.15.0 | Fix: Upgrade to 2.17.1 | SLA: within 48h (past due: 3 hosts!)</text>
  <text x="20" y="326" class="label" font-size="11">  ↳ Exploitability: Exploit code public · CISA KEV listed · Active exploitation confirmed</text>

  <text x="20" y="346" class="val-err" font-size="11">CRITICAL (CVSS 9.1): CVE-2022-26134 (Confluence RCE) — 2 hosts affected</text>
  <text x="20" y="362" class="label" font-size="11">  ↳ Affected: Confluence Server 7.18.0 | Fix: Upgrade to 7.18.1 | SLA: within 48h (CURRENT)</text>

  <text x="20" y="382" class="val-warn" font-size="11">HIGH (CVSS 7.5): CVE-2023-44487 (HTTP/2 Rapid Reset DoS) — 31 hosts affected</text>
  <text x="20" y="398" class="label" font-size="11">  ↳ Affected: nginx &lt;1.25.3 | Fix: Patch + disable HTTP/2 if not needed | SLA: within 7d</text>

  <!-- Ticket creation output -->
  <line x1="20" y1="412" x2="840" y2="412" stroke="#30363d" stroke-width="1"/>
  <text x="20" y="428" class="val-ok" font-size="11">[2026-04-08 09:14:08] Creating Jira tickets for SLA-breached and critical findings...</text>
  <text x="20" y="444" class="val-ok" font-size="11">  ✓ Ticket SEC-1047 created: Log4Shell remediation — 14 hosts — CRITICAL P1</text>
  <text x="20" y="460" class="val-ok" font-size="11">  ✓ Ticket SEC-1048 created: Confluence RCE patch — 2 hosts — CRITICAL P1</text>
  <text x="20" y="476" class="val-ok" font-size="11">  ✓ Ticket SEC-1049 created: HTTP/2 Rapid Reset — 31 hosts — HIGH P2</text>
  <text x="20" y="492" class="val-ok" font-size="11">[2026-04-08 09:14:09] Report written to: reports/vuln-report-2026-04-08.csv</text>

  <!-- Summary callout -->
  <rect x="10" y="508" width="840" height="42" rx="6" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1"/>
  <text x="25" y="524" class="val-ok" font-size="11" font-weight="bold">AUTOMATION RESULT:</text>
  <text x="160" y="524" class="label" font-size="11">847 vulns triaged · 3 Jira tickets auto-created · SLA breach report emailed to engineering leads</text>
  <text x="25" y="540" class="val-dim" font-size="11">Time saved vs manual triage: ~4 hours. Script runs nightly via cron. API rate limit: 10 req/min (NVD).</text>
</svg>